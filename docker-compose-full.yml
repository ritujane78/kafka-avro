networks:
  kafka-net:
    name: kafka-net
    driver: bridge

services:

  kafka:
    image: apache/kafka:4.1.1
    container_name: kafka
    hostname: kafka
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "29092:29092"

    environment:
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_NODE_ID: 1
      KAFKA_CLUSTER_ID: 5L6g3nShT-eMCtK--X86sw

      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093

      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:29092,CONTROLLER://:9093

      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:29092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL

      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1

      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0

    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 10s
      retries: 10

  kafka-schema-registry:
    image: confluentinc/cp-schema-registry:7.7.0
    container_name: kafka-schema-registry
    hostname: kafka-schema-registry
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "8081:8081"

    depends_on:
      kafka:
        condition: service_healthy

    environment:
      SCHEMA_REGISTRY_HOST_NAME: kafka-schema-registry

      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081

      # Kafka connection
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092

      SCHEMA_REGISTRY_LOG4J_ROOT_LOGLEVEL: INFO

  kafka-connect:
    image: confluentinc/cp-kafka-connect:7.7.0
    container_name: kafka-connect
    hostname: kafka-connect
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "8083:8083"

    depends_on:
      kafka:
        condition: service_healthy
      kafka-schema-registry:
        condition: service_started

    environment:
      # Kafka broker
      CONNECT_BOOTSTRAP_SERVERS: kafka:29092

      # REST API
      CONNECT_REST_PORT: 8083
      CONNECT_REST_ADVERTISED_HOST_NAME: kafka-connect

      # Connect cluster
      CONNECT_GROUP_ID: kafka-connect-cluster

      # Internal topics
      CONNECT_CONFIG_STORAGE_TOPIC: connect-configs
      CONNECT_OFFSET_STORAGE_TOPIC: connect-offsets
      CONNECT_STATUS_STORAGE_TOPIC: connect-status

      # Replication
      CONNECT_CONFIG_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_OFFSET_STORAGE_REPLICATION_FACTOR: 1
      CONNECT_STATUS_STORAGE_REPLICATION_FACTOR: 1

      # Serializers
      CONNECT_KEY_CONVERTER: org.apache.kafka.connect.storage.StringConverter

      CONNECT_VALUE_CONVERTER: io.confluent.connect.avro.AvroConverter

      CONNECT_VALUE_CONVERTER_SCHEMA_REGISTRY_URL: http://kafka-schema-registry:8081

      # Internal serializers
      CONNECT_INTERNAL_KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      CONNECT_INTERNAL_VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter

      # Logging
      CONNECT_LOG4J_ROOT_LOGLEVEL: INFO

      # Plugin locations
      CONNECT_PLUGIN_PATH: /usr/share/java,/usr/share/confluent-hub-components,/data/connectors

    volumes:
      - ./data/kafka-connect-data/connectors:/data/connectors
      - ./data/kafka-connect-data/inputs:/data/inputs
      - ./data/kafka-connect-data/errors:/data/errors
      - ./data/kafka-connect-data/processed:/data/processed

  kafka-rest-proxy:
    image: confluentinc/cp-kafka-rest:7.7.0
    container_name: kafka-rest-proxy
    hostname: kafka-rest-proxy
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "8082:8082"

    depends_on:
      - kafka
      - kafka-schema-registry

    environment:
      KAFKA_REST_HOST_NAME: kafka-rest-proxy

      KAFKA_REST_LISTENERS: http://0.0.0.0:8082

      # Kafka broker
      KAFKA_REST_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:29092

      # Schema registry
      KAFKA_REST_SCHEMA_REGISTRY_URL: http://kafka-schema-registry:8081

  kafka-ksqldb:
    image: confluentinc/cp-ksqldb-server:7.7.0
    container_name: kafka-ksqldb
    hostname: kafka-ksqldb
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "8088:8088"

    depends_on:
      - kafka
      - kafka-connect
      - kafka-schema-registry

    environment:
      # Kafka
      KSQL_BOOTSTRAP_SERVERS: kafka:29092

      # REST server
      KSQL_LISTENERS: http://0.0.0.0:8088

      # ksqlDB service id
      KSQL_KSQL_SERVICE_ID: kafka-ksqldb

      # Schema registry
      KSQL_KSQL_SCHEMA_REGISTRY_URL: http://kafka-schema-registry:8081

      # Kafka Connect
      KSQL_KSQL_CONNECT_URL: http://kafka-connect:8083

      # Auto-create processing topics
      KSQL_KSQL_LOGGING_PROCESSING_STREAM_AUTO_CREATE: "true"

      KSQL_KSQL_LOGGING_PROCESSING_TOPIC_AUTO_CREATE: "true"

      # UDF directory
      KSQL_KSQL_EXTENSION_DIR: /data/udfs

    volumes:
      - ./data/kafka-ksqldb-data/scripts:/data/scripts
      - ./data/kafka-ksqldb-data/udfs:/data/udfs

  postgresql:
    image: postgres:16
    container_name: conduktor-postgresql
    hostname: postgresql
    restart: unless-stopped

    networks:
      - kafka-net

    ports:
      - "5432:5432"

    environment:
      POSTGRES_DB: conduktor-console
      POSTGRES_USER: conduktor
      POSTGRES_PASSWORD: change_me
